<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ashmita ❤️</title>

<style>

/* Background */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    flex-direction: column;
    align-items: center;
    color: white;
}

/* Heading */
h1 {
    margin-top: 20px;
    font-size: 2.5rem;
    text-align: center;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px #ff4081; }
}

/* Glass Card */
.container {
    width: 90%;
    max-width: 400px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* Slideshow */
.slideshow {
    position: relative;
    width: 100%;
    height: 400px;
    border-radius: 15px;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Message */
.message {
    margin-top: 15px;
    font-size: 1rem;
    text-align: center;
    line-height: 1.6;
}

/* Button */
button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff4081;
    font-size: 16px;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 500px) {
    h1 {
        font-size: 1.8rem;
    }
    .slideshow {
        height: 300px;
    }
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday Ashmita ❤️</h1>

<div class="container">

    <!-- Slideshow -->
    <div class="slideshow">
        <div class="slide active"><img src="img1.jpg"></div>
        <div class="slide"><img src="img2.jpg"></div>
        <div class="slide"><img src="img3.jpg"></div>
        <div class="slide"><img src="img4.jpg"></div>
        <div class="slide"><img src="img5.jpg"></div>
        <div class="slide"><img src="img6.jpg"></div>
        <div class="slide"><img src="img7.jpg"></div>
    </div>

    <!-- Message -->
    <div class="message">
        Happy Birthday to the one who makes every moment brighter ✨<br>
May your life be filled with endless happiness and success 🎉<br>
You’re not just a friend, you’re a piece of my heart ❤️<br>
Cheers to more memories, laughter, and unforgettable moments 🥂<br>
    </div>

    <!-- Button -->
    <button onclick="playMusic()">Play Music 🎵</button>

</div>

<!-- Audio -->
<audio id="music" loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

/* Slideshow */
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlides() {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}

setInterval(showSlides, 2500);

/* Music */
function playMusic() {
    document.getElementById("music").play();
}

</script>

</body>
</html>
