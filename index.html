<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Ashmita ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    overflow: hidden;
    color: white;
    text-align: center;
}

/* Heading */
h1 {
    margin-top: 20px;
    font-size: 2.2rem;
}

/* Floating Images */
.image {
    position: absolute;
    width: 100px;
    height: 130px;
    border-radius: 15px;
    object-fit: cover;
    opacity: 0;
    animation: fly 2s forwards;
}

@keyframes fly {
    to {
        opacity: 1;
        transform: translate(0,0);
    }
}

/* Teddy */
.teddy {
    width: 120px;
    margin-top: 20px;
    cursor: pointer;
}

/* Cake Section */
#cakeSection {
    display: none;
    margin-top: 30px;
}

.cake {
    font-size: 80px;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<h1>🎉 Happy Birthday Ashmita ❤️</h1>

<!-- Teddy -->
<img src="images.png" class="teddy" onclick="playSong()" title="Click me 🧸">

<p>Click the teddy 🧸</p>

<!-- Cake Section -->
<div id="cakeSection">
    <div class="cake">🎂🕯️</div>
    <button onclick="blowCandle()">Blow Candle 🎂</button>
</div>

<!-- Audio -->
<audio id="song">
    <source src="Birthday.mp3" type="audio/mpeg">
</audio>

<script>

/* Images flying from corners */
const positions = [
    "translate(-500px,-500px)",
    "translate(500px,-500px)",
    "translate(-500px,500px)",
    "translate(500px,500px)",
    "translate(-500px,0)",
    "translate(500px,0)",
    "translate(0,-500px)",
    "translate(0,500px)",
    "translate(-300px,300px)",
    "translate(300px,-300px)"
];

for(let i=1;i<=12;i++){
    let img = document.createElement("img");
    img.src = "img"+i+".jpg";
    img.className = "image";

    img.style.left = Math.random()*80 + "%";
    img.style.top = Math.random()*80 + "%";
    img.style.transform = positions[i-1];

    img.style.animationDelay = (i*0.5)+"s";

    document.body.appendChild(img);
}

/* Teddy click */
function playSong(){
    document.getElementById("song").play();
    document.getElementById("cakeSection").style.display="block";
}

/* Blow candle */
function blowCandle(){
    document.querySelector(".cake").innerHTML="🎂✨";
    alert("Happy Birthday Ashmita ❤️🎉");
}

</script>

</body>
</html>
